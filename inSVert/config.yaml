genome:
  ploidy: 1
  heterozygosity: 0.5 # Probability that any given copy carries the variant

variants:

  DEL:
    count: 100        
    distribution: "lognormal"
    parameters:
      mean_length: 5000      # Target mean length in bp
      sigma:             # Shape parameter for lognormal
      min_length: 50        # Hard cap: nothing smaller than 50bp
      max_length: 100000     # Hard cap: nothing larger than 10kb

  INS:
    count: 100
    distribution: "lognormal" 
    parameters:
      mean_length: 10000
      sigma: 
      min_length: 60
      max_length: 100000


  DUP:                                # tandem duplications
    count: 100               
    distribution: "lognormal"
    parameters:
      mean_length: 2000
      sigma: 200
      min_length: 50
      max_length: 5000
    copy_number:           
      min: 2
      max: 5
      weights: [0.7, 0.2, 0.05, 0.05] # Probability for CN=2, 3, 4, 5


  INV:
    count: 100
    distribution: "lognormal"   
    parameters:
      mean_length: 50000
      sigma: 1000
      min_length: 1000
      max_length: 100000


  TRA:
    count: 100
    distribution: "lognormal"   
    parameters:
      mean_length: 50000
      sigma: 1000
      min_length: 1000
      max_length: 100000
